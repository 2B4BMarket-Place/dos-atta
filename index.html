        body {

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';

            border: 3px solid #00cc99;
            box-shadow: 0 0 40px #00cc9940, inset 0 0 20px #00cc9920;
            border-radius: 20px;
            padding: 30px;
            color: #b3ffe0;
        }
        h1 {
            font-size: 3rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 8px;

        .sub {
            text-align: center;
            color: #66ffcc;
            margin-bottom: 30px;
            font-size: 1.2rem;
            border-bottom: 1px dashed #00cc99;
            padding-bottom: 10px;
        }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .left {
            flex: 2;
            min-width: 280px;
        }
        .right {
            flex: 1;
            min-width: 200px;
            background: #0f1a1a;
            border: 1px solid #00cc99;
            border-radius: 12px;
            padding: 15px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #9fdfbf;
        }
        input, select, button {
            width: 100%;
            padding: 14px 18px;
            background: #102020;
            border: 2px solid #008b6b;
            color: #ccffdd;
            font-size: 1.2rem;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            border-color: #00ffff;
            box-shadow: 0 0 20px cyan;
        }
        button {
            background: #004d40;
            border-color: #00e6b8;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }
        button:hover {
            background: #006b5e;
            box-shadow: 0 0 30px #00ffbf;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .stat-item {
            background: #0a1515;
            padding: 12px;
            border-left: 5px solid #00e6b8;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 4px;
            text-align: center;
        }
        .stat-item span {
            display: block;
            font-size: 0.8rem;
            color: #66cc99;
        }
        .log-box {
            background: #051010;
            border: 1px solid #00cc99;
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #88ffbb;
            box-shadow: inset 0 0 30px #000;
        }
        .log-entry {
            border-bottom: 1px solid #1a3a3a;
            padding: 4px 0;
            font-family: monospace;
        }
        .time {
            color: #ffb86b;
        }
        .status-good {
            color: #00ffaa;
        }
        .status-bad {
            color: #ff5555;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #3b6b6b;
            font-size: 0.9rem;
        }
        .tg {
            color: #ffcc66;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
